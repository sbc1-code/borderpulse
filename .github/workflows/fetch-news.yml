name: Mode C news curation

on:
  # Cron disabled for initial ship. Mode C is free (no LLM) but we're keeping
  # the PR noise off until Sebastian opts in. Manual trigger only. When ready,
  # uncomment the schedule.
  # schedule:
  #   - cron: '0 15 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  curate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Fetch feeds
        run: node scripts/fetch-news.mjs
        # rss-parser returns non-zero only when every feed fails. Per-feed
        # failures are logged and reported in latest-feed.json.feed_health.

      - name: Classify and update per-port timelines
        run: node scripts/build-curation-queue.mjs

      - name: Commit timelines and open PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          DATE=$(date -u +%Y-%m-%d)
          BRANCH="mode-c/curation-$DATE"
          git config user.name "borderpulse-bot"
          git config user.email "207095575+sbc1-code@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add public/data/timelines/ drafts/curation/*.json || true
          if git diff --cached --quiet; then
            echo "No curation updates. Nothing to commit."
            exit 0
          fi
          git commit -m "Mode C: curation digest $DATE"
          git push --set-upstream origin "$BRANCH"
          gh pr create \
            --title "Mode C curation $DATE" \
            --body "Auto-generated news curation digest and per-port timeline updates. Review drafts/curation/$DATE.json, delete any false positives, then merge to update public/data/timelines/." \
            --label "draft:mode-c" \
            --base main

      # Auto-file an issue on failure, dedup'd by label.
      - name: Open issue on failure (deduped)
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const label = 'ci-failure';
            const flow = 'fetch-news';
            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: `${label},${flow}`,
              state: 'open',
            });
            if (existing.data.length > 0) {
              core.info(`Open ${flow} failure issue already exists (#${existing.data[0].number}). Skipping.`);
              return;
            }
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `[ops] ${context.workflow} failing on main`,
              body: [
                `**Workflow:** \`${context.workflow}\``,
                `**Commit:** \`${context.sha.substring(0, 7)}\``,
                `**First failure:** ${new Date().toISOString()}`,
                ``,
                `Subsequent failures are suppressed until this issue is closed.`,
                ``,
                `[View failed run](${runUrl})`,
              ].join('\n'),
              labels: ['ops', label, flow],
            });
