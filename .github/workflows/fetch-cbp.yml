name: Fetch CBP wait times

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write
  issues: write

concurrency:
  group: fetch-cbp
  cancel-in-progress: false

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Fetch CBP border wait times
        run: node scripts/fetch-cbp.mjs
      - name: Fetch USD/MXN exchange rate
        run: node scripts/fetch-fx.mjs
      - name: Fetch southbound estimates
        run: node scripts/fetch-sb.mjs
        env:
          GOOGLE_MAPS_API_KEY: ${{ secrets.GOOGLE_MAPS_API_KEY }}
      - name: Commit data snapshot
        run: |
          git config user.name  "borderpulse-bot"
          git config user.email "borderpulse-bot@users.noreply.github.com"
          git add public/data/crossings.json public/data/exchange-rate.json public/data/crossings-sb.json
          if git diff --cached --quiet; then
            echo "No data changes."
          else
            git commit -m "chore(data): refresh CBP + FX + SB snapshot"
            git push
          fi
      - name: Build static site
        run: npm run build
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v5
        with:
          path: dist
      - id: deployment
        uses: actions/deploy-pages@v4

      # Auto-file an issue on failure, dedup'd by label so we don't spam
      # every 15 min. Closes the loop on "I saw it in Gmail and forgot."
      - name: Open issue on failure (deduped)
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const label = 'ci-failure';
            const flow = 'fetch-cbp';
            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: `${label},${flow}`,
              state: 'open',
            });
            if (existing.data.length > 0) {
              core.info(`Open ${flow} failure issue already exists (#${existing.data[0].number}). Skipping.`);
              return;
            }
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `[ops] ${context.workflow} failing on main`,
              body: [
                `**Workflow:** \`${context.workflow}\``,
                `**Commit:** \`${context.sha.substring(0, 7)}\``,
                `**First failure:** ${new Date().toISOString()}`,
                ``,
                `Subsequent failures are suppressed until this issue is closed.`,
                ``,
                `[View failed run](${runUrl})`,
              ].join('\n'),
              labels: ['ops', label, flow],
            });
