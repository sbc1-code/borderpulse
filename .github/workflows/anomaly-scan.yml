name: Mode A anomaly scan

on:
  # Hourly cron drives the inline anomaly callouts on /crossing/<slug>: every
  # run regenerates public/data/anomalies.json from the latest aggregates and
  # commits it (chore(data) prefix → deploy.yml skips). The draft-PR flow
  # stays manual (workflow_dispatch only) so the cron never spams PRs.
  # To enable LLM drafting later, add ANTHROPIC_API_KEY to repo secrets and
  # wire draft-from-anomaly-llm.mjs in.
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  issues: write

concurrency:
  group: anomaly-scan
  cancel-in-progress: false

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Regenerate aggregates from committed snapshots
        run: node scripts/build-aggregates.mjs

      - name: Detect anomalies
        run: node scripts/detect-anomalies.mjs

      - name: Commit anomalies.json (always)
        run: |
          git config user.name "borderpulse-bot"
          git config user.email "207095575+sbc1-code@users.noreply.github.com"
          git add public/data/anomalies.json
          if git diff --cached --quiet; then
            echo "anomalies.json unchanged. Nothing to commit."
            exit 0
          fi
          git commit -m "chore(data): refresh anomalies"
          git push

      - name: Check for anomalies (drafter)
        if: github.event_name == 'workflow_dispatch'
        id: check
        run: |
          COUNT=$(node -e "const d=JSON.parse(require('fs').readFileSync('drafts/blog/auto-a/queue.json','utf8')); console.log((d.anomalies || []).length);")
          echo "anomaly_count=$COUNT" >> $GITHUB_OUTPUT
          echo "Detected $COUNT anomalies."

      - name: Draft posts from anomalies (template-based, no API cost)
        if: github.event_name == 'workflow_dispatch' && steps.check.outputs.anomaly_count != '0'
        run: node scripts/draft-from-anomaly.mjs

      - name: Commit drafts and open PR
        if: github.event_name == 'workflow_dispatch' && steps.check.outputs.anomaly_count != '0'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          DATE=$(date -u +%Y-%m-%d)
          BRANCH="auto-a/drafts-$DATE"
          git checkout -b "$BRANCH"
          # Only add the generated draft MDX files (queue.json is gitignored).
          git add drafts/blog/auto-a/*.mdx || true
          if git diff --cached --quiet; then
            echo "No draft files changed. Nothing to commit."
            exit 0
          fi
          git commit -m "Mode A: drafts for $DATE"
          git push --set-upstream origin "$BRANCH"
          gh pr create \
            --title "Mode A drafts $DATE" \
            --body "Auto-generated draft posts from today's anomaly scan. Review each one per drafts/REVIEW_CHECKLIST.md. Merge after rewriting headline and lede, flipping humanEdited:true, and moving the file to src/content/blog/." \
            --label "draft:auto-a" \
            --base main

      # Auto-file an issue on failure, dedup'd by label so we don't spam.
      - name: Open issue on failure (deduped)
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const label = 'ci-failure';
            const flow = 'anomaly-scan';
            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: `${label},${flow}`,
              state: 'open',
            });
            if (existing.data.length > 0) {
              core.info(`Open ${flow} failure issue already exists (#${existing.data[0].number}). Skipping.`);
              return;
            }
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `[ops] ${context.workflow} failing on main`,
              body: [
                `**Workflow:** \`${context.workflow}\``,
                `**Commit:** \`${context.sha.substring(0, 7)}\``,
                `**First failure:** ${new Date().toISOString()}`,
                ``,
                `Subsequent failures are suppressed until this issue is closed.`,
                ``,
                `[View failed run](${runUrl})`,
              ].join('\n'),
              labels: ['ops', label, flow],
            });
