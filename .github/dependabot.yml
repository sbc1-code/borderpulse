version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "14:00"
      timezone: "UTC"
    open-pull-requests-limit: 5
    reviewers:
      - "sbc1-code"
    labels:
      - "deps"
      - "automated"
    commit-message:
      prefix: "deps"
      include: "scope"
    groups:
      radix-ui:
        patterns:
          - "@radix-ui/*"
      react:
        patterns:
          - "react"
          - "react-dom"
          - "react-router-dom"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "14:00"
      timezone: "UTC"
    open-pull-requests-limit: 3
    labels:
      - "deps"
      - "github-actions"
    commit-message:
      prefix: "ci"
